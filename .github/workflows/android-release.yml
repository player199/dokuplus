name: Web check

# Fast sanity check on every push — verifies the web build compiles cleanly.
# Native builds (iOS / Android) are handled by store-release.yml on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
