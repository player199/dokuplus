name: Store release

# Ships signed builds to the stores' test tracks. Trigger by pushing a version
# tag (e.g. v1.0.0) or running it manually. All credentials come from repo
# secrets — see RELEASE.md for the exact list and how to create them.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ios_only:
        description: 'Only run the iOS job (skip Android, which already works)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  android:
    name: Android → Play internal
    # Skip when a manual run asks for iOS only.
    if: ${{ github.event.inputs.ios_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build web + sync
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Build + upload (fastlane)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '1.0' }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane android internal

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: dokuplus-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

  ios:
    name: iOS → TestFlight
    # Capacitor 8 requires Xcode 26 (Swift 6.2) — its precompiled framework
    # gates CAPPluginCall.reject() etc. behind a Swift 6.2 feature. Older Xcode
    # strips those methods and the plugin sources fail to compile. macos-26
    # ships Xcode 26 by default. See ionic-team/capacitor#8333.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build web + sync
        run: |
          npm ci
          npm run build
          npx cap sync ios

      - name: Decode signing assets
        run: |
          # App Store Connect API key (for the TestFlight upload).
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 -d > "$RUNNER_TEMP/asc_key.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/asc_key.p8" >> "$GITHUB_ENV"

          # Distribution certificate (.p12) — imported into a keychain by fastlane.
          echo "${{ secrets.IOS_DIST_CERT_P12_BASE64 }}" | base64 -d > "$RUNNER_TEMP/dist_cert.p12"
          echo "CERT_P12_PATH=$RUNNER_TEMP/dist_cert.p12" >> "$GITHUB_ENV"

          # App Store provisioning profile — install it where Xcode looks and
          # read its embedded Name so the build can reference it by specifier.
          PROFILE="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > "$PROFILE"
          security cms -D -i "$PROFILE" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Build + upload (fastlane)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERT_P12_PATH: ${{ env.CERT_P12_PATH }}
          CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_NAME: ${{ env.PROFILE_NAME }}
        run: bundle exec fastlane ios beta
